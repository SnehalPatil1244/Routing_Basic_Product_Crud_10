<div class="main-auth">
    <div class="card" style="width: 350px;">
        <div class="card-body">
            <ng-container *ngIf="isAllReadyHasValue">
                <h2 class="text-primary">Log In</h2>
                <form [formGroup]="LoginForm" (ngSubmit)="onlogin()">
                    <div class="form-group">
                        <label for="email">Email*</label>
                        <input type="text" formControlName="email" class="form-control">
                        <small *ngIf="l['email'].touched && l['email'].hasError('requried')">Email Is Requried
                            Field...</small>
                    </div>
                    <div class="form-group">
                        <label for="password">Password*</label>
                        <input type="text" formControlName="password" class="form-control">
                        <small *ngIf="l['email'].touched && l['email'].hasError('requried')">Password Is Requried
                            Field..</small>
                    </div>
                    <button class="w-100 mb-3" mat-raised-button color="primary">Log In</button>
                    <a (click)="isAllReadyHasValue = true" href="javascript:;">Don't Have Account</a>
                </form>
            </ng-container>
            <ng-container *ngIf="!isAllReadyHasValue">
                <h2 class="text-primary">Sign Up</h2>
                <form [formGroup]="SignUpForm" (ngSubmit)="onsignup()">
                    <div class="form-group">
                        <label for="email">Email*</label>
                        <input type="text" formControlName="email" class="form-control">
                        <small *ngIf="s['email'].touched && s['email'].hasError('requried')">Email Is Requried
                            Field...</small>
                    </div>
                    <div class="form-group">
                        <label for="password">Password*</label>
                        <input type="text" formControlName="password" class="form-control">
                        <small *ngIf="s['email'].touched && s['email'].hasError('requried')">Password Is Requried
                            Field..</small>
                    </div>
                    <div class="form-group">
                        <label for="userRole">userRole*</label>
                        <select type="text" formControlName="userRole" class="form-control">
                            <option value="buyer">Buyer</option>
                            <option value="admin">Admin</option>
                            <option value="superAdmin">SuperAdmin</option>
                        </select>
                        <small *ngIf="s['userRole'].touched && s['userRole'].hasError('requried')">UserRole Has Requried Field...</small>
                    </div>
                    <button mat-raised-button color="primary" class="w-100 mb-3">Sign Up</button>
                    <a (click)="isAllReadyHasValue= true" href="javascript:;">Already Has An Account</a>
                </form>
            </ng-container>
        </div>
    </div>
</div>
